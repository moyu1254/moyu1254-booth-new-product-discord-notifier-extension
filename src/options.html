<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BOOTH 新着通知 設定</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <h1>BOOTH 新着通知 設定</h1>

      <form id="settings-form" class="panel">
        <label>
          Discord Webhook URL
          <input id="discord-webhook-url" type="url" placeholder="https://discord.com/api/webhooks/..." autocomplete="off">
        </label>

        <label>
          BOOTH タグ
          <textarea id="booth-tags" rows="6" placeholder="VRChat&#10;Unity"></textarea>
          <span class="hint">1行に1タグずつ入力してください。</span>
        </label>

        <label>
          定期チェック間隔（分）
          <input id="check-interval-minutes" type="number" min="1" step="1">
        </label>

        <label>
          検索ページ数
          <input id="search-page-limit" type="number" min="1" max="5" step="1">
          <span class="hint">1回のチェックで確認する BOOTH 検索結果ページ数です。1〜5 の範囲で指定できます。</span>
        </label>

        <label>
          新着商品一覧の表示件数
          <input id="recent-products-limit" type="number" min="20" max="500" step="10">
          <span class="hint">ポップアップ内に保存・表示する商品数です。20〜500 件の範囲で指定できます。</span>
        </label>

        <label class="checkbox">
          <input id="include-adult" type="checkbox">
          成人向け商品を検索結果に含める
          <span class="hint">BOOTH の年齢確認が未完了の状態では検索結果が 0 件になる場合があります。</span>
        </label>

        <label class="checkbox">
          <input id="skip-initial-existing-products" type="checkbox">
          初回は既存商品を通知せず、次回以降の新商品だけ通知する
        </label>

        <fieldset>
          <legend>Discord通知</legend>

          <label class="checkbox">
            <input id="notify-discord" type="checkbox">
            Discord に通知する
          </label>

          <span class="hint">拡張機能内の新着商品一覧と未読バッジは常に更新されます。</span>
        </fieldset>

        <div class="actions">
          <button type="submit">保存</button>
          <button id="run-now" type="button">今すぐ実行</button>
          <button id="reset-seen" type="button" class="secondary">通知済み履歴をリセット</button>
        </div>
      </form>

      <section class="panel">
        <h2>最終実行結果</h2>
        <pre id="last-run">まだ実行されていません。</pre>
      </section>

      <p id="status" role="status"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
